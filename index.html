<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denim Lodge & Nest - メール作成アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f0eb; color: #333; }

.header {
  background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8a 100%);
  color: white; padding: 20px 30px; display: flex; align-items: center; gap: 15px;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 3px; }

.container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.panel {
  background: white; border-radius: 12px; padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.panel h2 {
  font-size: 16px; color: #1a3a5c; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 2px solid #e8ddd3;
}

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: #2c5f8a; box-shadow: 0 0 0 3px rgba(44,95,138,0.1);
}
.form-group textarea { resize: vertical; min-height: 100px; font-family: inherit; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.btn {
  padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #2c5f8a, #1a3a5c); color: white; width: 100%;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,95,138,0.3); }
.btn-copy {
  background: #e8ddd3; color: #1a3a5c; margin-top: 10px; width: 100%;
}
.btn-copy:hover { background: #d4c4b5; }
.btn-copy.copied { background: #4caf50; color: white; }

.output-area {
  width: 100%; min-height: 400px; padding: 16px; border: 1px solid #ddd;
  border-radius: 8px; font-size: 14px; line-height: 1.7; white-space: pre-wrap;
  word-wrap: break-word; background: #fafaf8; font-family: inherit;
  resize: vertical;
}

.template-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
}
.template-btn {
  padding: 10px 12px; border: 2px solid #e8ddd3; border-radius: 8px;
  background: white; cursor: pointer; text-align: left; font-size: 12px;
  transition: all 0.2s; line-height: 1.4;
}
.template-btn:hover { border-color: #2c5f8a; background: #f0f5fa; }
.template-btn.active { border-color: #2c5f8a; background: #e8f0f8; font-weight: 600; }
.template-btn.hidden { display: none; }
.template-btn .tag {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; margin-bottom: 3px;
}
.tag-en { background: #e3f2fd; color: #1565c0; }
.tag-jp { background: #fce4ec; color: #c62828; }
.tag-both { background: #e8f5e9; color: #2e7d32; }

.section-label {
  font-size: 13px; font-weight: 700; color: #1a3a5c; margin: 12px 0 6px;
  padding: 4px 8px; background: #f0f5fa; border-radius: 4px;
}
.section-label.hidden { display: none; }

.customer-email-box {
  width: 100%; min-height: 120px; padding: 12px; border: 2px dashed #ccc;
  border-radius: 8px; font-size: 14px; line-height: 1.6; background: #fffef9;
  font-family: inherit; resize: vertical;
}
.customer-email-box:focus { border-color: #2c5f8a; outline: none; }

.info-note {
  background: #fff3e0; border-left: 4px solid #ff9800; padding: 10px 14px;
  border-radius: 0 8px 8px 0; font-size: 12px; margin-bottom: 14px; line-height: 1.5;
}

/* OTA選択ボタン */
.ota-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px;
}
.ota-btn {
  padding: 12px 8px; border: 2px solid #d0d0d0; border-radius: 10px;
  background: white; cursor: pointer; text-align: center; font-size: 13px;
  font-weight: 600; transition: all 0.2s; line-height: 1.3;
}
.ota-btn:hover { border-color: #2c5f8a; background: #f0f5fa; }
.ota-btn.active { border-color: #2c5f8a; background: #1a3a5c; color: white; }
.ota-btn .ota-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.ota-btn .ota-sub { font-size: 10px; font-weight: 400; opacity: 0.7; display: block; margin-top: 2px; }

.payment-fields { transition: all 0.3s; }
.payment-fields.dimmed { opacity: 0.3; pointer-events: none; }
.payment-fields .payment-note {
  background: #e8f5e9; border-left: 4px solid #4caf50; padding: 8px 12px;
  border-radius: 0 8px 8px 0; font-size: 12px; margin-bottom: 10px; line-height: 1.5; color: #2e7d32;
}
.payment-fields .payment-note.need-link {
  background: #fff3e0; border-left-color: #ff9800; color: #e65100;
}

/* パスワード画面 */
.lock-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8a 50%, #1a3a5c 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.lock-overlay.hidden { display: none; }
.lock-box {
  background: white; border-radius: 16px; padding: 40px 36px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 400px; width: 90%;
}
.lock-box .lock-icon { font-size: 48px; margin-bottom: 12px; }
.lock-box h2 { font-size: 20px; color: #1a3a5c; margin-bottom: 6px; }
.lock-box .lock-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
.lock-box input {
  width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px;
  font-size: 16px; text-align: center; letter-spacing: 2px;
}
.lock-box input:focus { outline: none; border-color: #2c5f8a; }
.lock-box .lock-btn {
  width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, #2c5f8a, #1a3a5c); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.lock-box .lock-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,95,138,0.3); }
.lock-box .lock-error {
  color: #c62828; font-size: 13px; margin-top: 10px; min-height: 20px;
}

/* メインコンテンツ：ログイン前は非表示 */
.app-content.locked { display: none; }

@media (max-width: 900px) {
  .container { grid-template-columns: 1fr; }
  .template-grid { grid-template-columns: 1fr; }
  .ota-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- パスワード画面 -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>Denim Lodge & Nest</h2>
    <div class="lock-sub">スタッフ専用メール作成アプリ</div>
    <input type="password" id="lockPassword" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') unlock()">
    <button class="lock-btn" onclick="unlock()">ログイン</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<!-- メインコンテンツ -->
<div class="app-content locked" id="appContent">

<div class="header">
  <div>
    <h1>Denim Lodge & Nest - メール作成アプリ</h1>
    <div class="subtitle">お客様のメールに合わせた返信メールを自動作成</div>
  </div>
</div>

<div class="container">
  <!-- 左パネル：入力 -->
  <div>
    <div class="panel" style="margin-bottom:20px">
      <h2>STEP 1: お客様のメール（参考用）</h2>
      <textarea class="customer-email-box" id="customerEmail" placeholder="お客様からのメールをここに貼り付けてください..."></textarea>
    </div>

    <div class="panel" style="margin-bottom:20px">
      <h2>STEP 2: 予約経路（OTA）を選択</h2>
      <div class="ota-grid">
        <button class="ota-btn" onclick="selectOTA('booking')" data-ota="booking">
          <span class="ota-icon">B</span>
          Booking.com
          <span class="ota-sub">= Agoda</span>
        </button>
        <button class="ota-btn" onclick="selectOTA('airbnb')" data-ota="airbnb">
          <span class="ota-icon">A</span>
          Airbnb
        </button>
        <button class="ota-btn" onclick="selectOTA('jalan')" data-ota="jalan">
          <span class="ota-icon">J</span>
          じゃらん
        </button>
        <button class="ota-btn" onclick="selectOTA('hp')" data-ota="hp">
          <span class="ota-icon">H</span>
          自社予約
          <span class="ota-sub">HP経由</span>
        </button>
        <button class="ota-btn" onclick="selectOTA('phone')" data-ota="phone">
          <span class="ota-icon">T</span>
          電話・紹介
          <span class="ota-sub">決済リンク要</span>
        </button>
      </div>
      <div id="otaStatusMsg" style="font-size:12px; color:#888; text-align:center;">予約経路を選択してください</div>
    </div>

    <div class="panel" style="margin-bottom:20px">
      <h2>STEP 3: お客様情報を入力</h2>
      <div class="form-row">
        <div class="form-group">
          <label>お客様の名前（姓 or ファーストネーム）</label>
          <input type="text" id="guestName" placeholder="例: 小西 / Skylar">
        </div>
        <div class="form-group">
          <label>敬称</label>
          <select id="honorific">
            <option value="様">様（日本語）</option>
            <option value="-san">-san（英語）</option>
            <option value="さん">さん</option>
            <option value="">なし</option>
          </select>
        </div>
      </div>
      <div class="form-row3">
        <div class="form-group">
          <label>宿泊人数</label>
          <input type="number" id="guestCount" min="1" max="6" value="1">
        </div>
        <div class="form-group">
          <label>宿泊数</label>
          <input type="number" id="nightCount" min="1" max="30" value="1">
        </div>
        <div class="form-group">
          <label>部屋</label>
          <select id="roomType">
            <option value="A">Room-A</option>
            <option value="B">Room-B</option>
            <option value="C">Room-C</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>チェックイン日</label>
          <input type="date" id="checkinDate">
        </div>
        <div class="form-group">
          <label>チェックイン時間</label>
          <input type="text" id="checkinTime" placeholder="例: 16:00～17:00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>宿泊料金（税込）</label>
          <input type="text" id="totalPrice" placeholder="例: 16,500">
        </div>
        <div class="form-group">
          <label>お客さんの出発地（任意）</label>
          <input type="text" id="guestOrigin" placeholder="例: 神戸 / Korea">
        </div>
      </div>

      <!-- 決済リンク欄（電話・紹介 / 自社予約のみ表示） -->
      <div class="payment-fields dimmed" id="paymentFields">
        <div class="payment-note" id="paymentNote">
          OTA経由の予約は事前オンライン決済済みです。決済リンクは不要です。
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>決済リンク（Square）</label>
            <input type="text" id="paymentLink" placeholder="https://square.link/u/...">
          </div>
          <div class="form-group">
            <label>支払い期限日</label>
            <input type="date" id="paymentDeadline">
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>STEP 4: テンプレートを選択</h2>

      <div class="section-label" id="sec-booking">予約承認・確定時</div>
      <div class="template-grid" id="grid-booking">
        <button class="template-btn" onclick="selectTemplate('ota_confirm_en')" data-ota="booking,airbnb,jalan">
          <span class="tag tag-en">EN</span><br>予約直後の完全版（All OTA）
        </button>
        <button class="template-btn" onclick="selectTemplate('ota_confirm_jp')" data-ota="booking,airbnb,jalan">
          <span class="tag tag-jp">JP</span><br>予約直後の完全版（All OTA）
        </button>
        <button class="template-btn" onclick="selectTemplate('hp_confirm_en')" data-ota="hp,phone">
          <span class="tag tag-en">EN</span><br>予約直後の完全版（自社予約）
        </button>
        <button class="template-btn" onclick="selectTemplate('hp_confirm_jp')" data-ota="hp,phone">
          <span class="tag tag-jp">JP</span><br>予約直後の完全版（自社予約）
        </button>
      </div>

      <div class="section-label" id="sec-checkin">チェックイン前</div>
      <div class="template-grid" id="grid-checkin">
        <button class="template-btn" onclick="selectTemplate('what_time_en')" data-ota="all">
          <span class="tag tag-en">EN</span><br>直近の到着時間質問
        </button>
        <button class="template-btn" onclick="selectTemplate('what_time_jp')" data-ota="all">
          <span class="tag tag-jp">JP</span><br>直近の到着時間質問
        </button>
        <button class="template-btn" onclick="selectTemplate('early_ci_en')" data-ota="all">
          <span class="tag tag-en">EN</span><br>アーリーC/I OK（掃除まだ）
        </button>
      </div>

      <div class="section-label" id="sec-special">特殊対応</div>
      <div class="template-grid" id="grid-special">
        <button class="template-btn" onclick="selectTemplate('child_booking_jp')" data-ota="booking,airbnb">
          <span class="tag tag-jp">JP</span><br>子供泊まれる？（Airbnb/Booking）
        </button>
      </div>

      <div class="section-label" id="sec-guide">案内・ガイド・署名</div>
      <div class="template-grid" id="grid-guide">
        <button class="template-btn" onclick="selectTemplate('parking_jp')" data-ota="all">
          <span class="tag tag-jp">JP</span><br>駐車場案内
        </button>
        <button class="template-btn" onclick="selectTemplate('parking_en')" data-ota="all">
          <span class="tag tag-en">EN</span><br>駐車場案内
        </button>
        <button class="template-btn" onclick="selectTemplate('guide_en')" data-ota="all">
          <span class="tag tag-en">EN</span><br>児島ガイド案内
        </button>
        <button class="template-btn" onclick="selectTemplate('guide_jp')" data-ota="all">
          <span class="tag tag-jp">JP</span><br>児島ガイド案内
        </button>
        <button class="template-btn" onclick="selectTemplate('signature_en')" data-ota="all">
          <span class="tag tag-en">EN</span><br>署名のみ
        </button>
        <button class="template-btn" onclick="selectTemplate('signature_jp')" data-ota="all">
          <span class="tag tag-jp">JP</span><br>署名のみ
        </button>
      </div>

      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="generateEmail()">メールを作成する</button>
      </div>
    </div>
  </div>

  <!-- 右パネル：出力 -->
  <div>
    <div class="panel" style="position:sticky;top:20px">
      <h2>作成されたメール</h2>
      <textarea class="output-area" id="outputEmail" placeholder="OTAを選択 → お客様情報を入力 → テンプレートを選んで「メールを作成する」を押してください"></textarea>
      <button class="btn btn-copy" id="copyBtn" onclick="copyEmail()">メールをコピー</button>
    </div>
  </div>
</div>

<script>
let selectedTemplate = null;
let selectedOTA = null;

// ============================
// OTA選択
// ============================
function selectOTA(ota) {
  selectedOTA = ota;
  document.querySelectorAll('.ota-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.ota-btn[data-ota="${ota}"]`).classList.add('active');

  const msgs = {
    booking: 'Booking.com / Agoda 経由 → 決済はOTA側で完了済み',
    airbnb: 'Airbnb 経由 → 決済はAirbnb側で完了済み',
    jalan: 'じゃらん 経由 → 現地決済（現金・カード・電子マネー）',
    hp: '自社HP 経由 → 事前決済（Square）済み ※決済リンク不要',
    phone: '電話・紹介 → 決済リンク（Square）を送る必要あり'
  };
  document.getElementById('otaStatusMsg').textContent = msgs[ota];
  document.getElementById('otaStatusMsg').style.color = ota === 'phone' ? '#e65100' : '#2e7d32';

  const payFields = document.getElementById('paymentFields');
  const payNote = document.getElementById('paymentNote');
  if (ota === 'phone') {
    payFields.classList.remove('dimmed');
    payNote.className = 'payment-note need-link';
    payNote.textContent = '電話・紹介予約のため、Squareの決済リンクを入力してください。';
  } else if (ota === 'hp') {
    payFields.classList.remove('dimmed');
    payNote.className = 'payment-note';
    payNote.textContent = '自社HP予約 → 事前にSquareで決済済みです。テンプレには決済済みとして反映されます。';
  } else {
    payFields.classList.add('dimmed');
    if (ota === 'jalan') {
      payNote.className = 'payment-note';
      payNote.textContent = 'じゃらん → 現地決済です。決済リンクは不要です。';
    } else {
      payNote.className = 'payment-note';
      payNote.textContent = 'OTA経由の予約は事前オンライン決済済みです。決済リンクは不要です。';
    }
  }

  filterTemplates(ota);

  selectedTemplate = null;
  document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
}

function filterTemplates(ota) {
  const allBtns = document.querySelectorAll('.template-btn[data-ota]');
  allBtns.forEach(btn => {
    const allowedOTAs = btn.getAttribute('data-ota').split(',');
    if (allowedOTAs.includes('all') || allowedOTAs.includes(ota)) {
      btn.classList.remove('hidden');
    } else {
      btn.classList.add('hidden');
    }
  });

  const sections = [
    { label: 'sec-booking', grid: 'grid-booking' },
    { label: 'sec-checkin', grid: 'grid-checkin' },
    { label: 'sec-special', grid: 'grid-special' },
    { label: 'sec-guide', grid: 'grid-guide' },
  ];
  sections.forEach(s => {
    const grid = document.getElementById(s.grid);
    const label = document.getElementById(s.label);
    const visibleBtns = grid.querySelectorAll('.template-btn:not(.hidden)');
    label.classList.toggle('hidden', visibleBtns.length === 0);
    grid.style.display = visibleBtns.length === 0 ? 'none' : '';
  });
}

function selectTemplate(id) {
  selectedTemplate = id;
  document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// ============================
// ヘルパー関数
// ============================
function getVal(id) { return document.getElementById(id).value; }

function formatDateJP(dateStr) {
  if (!dateStr) return '●月●日';
  const d = new Date(dateStr);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function formatDateEN(dateStr) {
  if (!dateStr) return 'Month Day';
  const d = new Date(dateStr);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
function formatDateENShort(dateStr) {
  if (!dateStr) return 'Month Day';
  const d = new Date(dateStr);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}
function formatDateENOrdinal(dateStr) {
  if (!dateStr) return 'Month Day';
  const d = new Date(dateStr);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const day = d.getDate();
  const suffix = (day === 1 || day === 21 || day === 31) ? 'st' : (day === 2 || day === 22) ? 'nd' : (day === 3 || day === 23) ? 'rd' : 'th';
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${day}${suffix}`;
}
function formatDateJPPayment(dateStr) {
  if (!dateStr) return '■月■日（■）';
  const d = new Date(dateStr);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function formatDateJPFull(dateStr) {
  if (!dateStr) return '●年●月●日（●）';
  const d = new Date(dateStr);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function formatYear(dateStr) {
  if (!dateStr) return '2026';
  return new Date(dateStr).getFullYear().toString();
}

// ============================
// メール生成
// ============================
function generateEmail() {
  if (!selectedOTA) {
    alert('予約経路（OTA）を選択してください');
    return;
  }
  if (!selectedTemplate) {
